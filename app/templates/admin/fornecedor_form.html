{% extends "base.html" %}
{% block title %}Novo Fornecedor - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <h2>{{ 'Editar' if fornecedor else 'Novo' }} Fornecedor</h2>

    <form method="POST" class="form-card">
        <div class="form-group">
            <label for="razao_social">Razão social</label>
            <input type="text" id="razao_social" name="razao_social" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="nome_contato">Nome do contato</label>
                <input type="text" id="nome_contato" name="nome_contato">
            </div>
            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" value="Londrina">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Salvar</button>
    </form>
    <a href="{{ url_for('admin.fornecedores') }}" class="back-link">Voltar</a>
</div>
{% endblock %}
