{% extends "base.html" %}
{% block title %}Cotação - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <a href="{{ url_for('rodadas.detalhe', rodada_id=rodada.id) }}" class="btn-back">Voltar para a rodada</a>
    <h2>Inserir Cotação</h2>
    <p class="subtitle">Rodada: {{ rodada.nome }}</p>

    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="fornecedor_id">Fornecedor</label>
            <select id="fornecedor_id" name="fornecedor_id" required>
                <option value="">Selecione...</option>
                {% for f in fornecedores %}
                    <option value="{{ f.id }}">{{ f.razao_social }}</option>
                {% endfor %}
            </select>
        </div>

        <h3>Preços por produto</h3>
        {% for produto in produtos %}
        <div class="form-row">
            <div class="form-group" style="flex:2">
                <label>{{ produto.nome }} ({{ produto.unidade }})</label>
            </div>
            <div class="form-group" style="flex:1">
                <input type="text" inputmode="numeric" name="preco_{{ produto.id }}"
                       class="money-input" placeholder="R$ 0,00">
            </div>
        </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary btn-block">Salvar cotação</button>
    </form>
</div>
<script src="{{ url_for('static', filename='js/money-mask.js') }}"></script>
{% endblock %}
