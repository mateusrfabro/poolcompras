{% extends "base.html" %}
{% block title %}Esqueci minha senha - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <h2>Esqueci minha senha</h2>
    <p class="page-sub">Informe o e-mail cadastrado e enviaremos um link para redefinir a senha.</p>
    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required
                   autocomplete="email" placeholder="seu@email.com">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Enviar link de recuperação</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('auth.login') }}">Voltar para login</a></p>
</div>
{% endblock %}
