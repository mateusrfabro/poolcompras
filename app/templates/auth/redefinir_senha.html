{% extends "base.html" %}
{% block title %}Redefinir senha - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <h2>Redefinir senha</h2>
    <p class="page-sub">Escolha uma nova senha (mínimo 8 caracteres).</p>
    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="senha">Nova senha</label>
            <input type="password" id="senha" name="senha" required minlength="8"
                   autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirmacao">Confirme a nova senha</label>
            <input type="password" id="confirmacao" name="confirmacao" required minlength="8"
                   autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Salvar nova senha</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('auth.login') }}">Cancelar</a></p>
</div>
{% endblock %}
