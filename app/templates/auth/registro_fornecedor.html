{% extends "base.html" %}
{% block title %}Cadastro Fornecedor - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <h2>Cadastro de Fornecedor</h2>
    <p class="subtitle">Cadastre-se para receber demandas e enviar cotações.</p>

    <form method="POST" class="form-card">
        <h3>Dados de acesso</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required minlength="6">
            </div>
        </div>

        <h3>Dados da empresa</h3>
        <div class="form-group">
            <label for="razao_social">Razão social</label>
            <input type="text" id="razao_social" name="razao_social" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="nome_responsavel">Nome do contato</label>
                <input type="text" id="nome_responsavel" name="nome_responsavel" required>
            </div>
            <div class="form-group">
                <label for="telefone">Telefone/WhatsApp</label>
                <input type="text" id="telefone" name="telefone" placeholder="(43) 99999-9999">
            </div>
        </div>
        <div class="form-group">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" value="Londrina">
        </div>

        <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
    </form>
    <p class="form-footer">Já tem conta? <a href="{{ url_for('auth.login') }}">Faça login</a></p>
    <p class="form-footer">É lanchonete? <a href="{{ url_for('auth.registro') }}">Cadastre-se aqui</a></p>
</div>
{% endblock %}
