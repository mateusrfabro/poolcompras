{% extends "base.html" %}
{% block title %}Cadastro - PoolCompras{% endblock %}

{% block content %}
<div class="form-page">
    <h2>Cadastrar Lanchonete</h2>
    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h3>Dados do responsável</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="nome_responsavel">Nome completo</label>
                <input type="text" id="nome_responsavel" name="nome_responsavel" required>
            </div>
            <div class="form-group">
                <label for="telefone">WhatsApp</label>
                <input type="text" id="telefone" name="telefone" placeholder="(43) 99999-9999">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required minlength="6">
            </div>
        </div>

        <h3>Dados da lanchonete</h3>
        <div class="form-row">
            <div class="form-group">
                <label for="nome_fantasia">Nome fantasia</label>
                <input type="text" id="nome_fantasia" name="nome_fantasia" required placeholder="Ex: Burguer do João">
            </div>
            <div class="form-group">
                <label for="cnpj">CNPJ (opcional)</label>
                <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco">
            </div>
            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
    </form>
    <p class="form-footer">Já tem conta? <a href="{{ url_for('auth.login') }}">Faça login</a></p>
</div>
{% endblock %}
