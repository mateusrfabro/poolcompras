version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: poolcompras-db
    restart: always
    environment:
      POSTGRES_DB: poolcompras
      POSTGRES_USER: poolcompras
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poolcompras"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: poolcompras-app
    restart: always
    environment:
      DATABASE_URL: postgresql://poolcompras:${DB_PASSWORD}@db:5432/poolcompras
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: run.py
      RUN_SEED: ${RUN_SEED:-false}
      PORT: ${PORT:-5050}
      WEB_WORKERS: ${WEB_WORKERS:-0}
    volumes:
      - uploads:/app/instance/uploads
      - logs:/var/log
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: poolcompras-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  logs: