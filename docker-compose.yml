# PoolCompras — docker-compose canonico (setup de prod do Ademar/Yggdrasil).
#
# Notas pra replicar:
# - Cloudflare Tunnel termina TLS — nao precisa nginx no compose. App fica
#   exposto SO via rede `server_net` (onde o cloudflared roda).
# - DB e app NAO publicam ports no host (mais seguro). Acesso externo apenas
#   pelo cloudflared via server_net.
# - Network `server_net` precisa existir antes do up:
#       docker network create server_net
# - Healthcheck do app usa Python socket (imagem nao tem curl).
# - Workers default = 4 (ajustar via WEB_WORKERS no .env).

services:
  db:
    image: postgres:16-alpine
    container_name: poolcompras-db
    restart: always
    environment:
      POSTGRES_DB: poolcompras
      POSTGRES_USER: poolcompras
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD no .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poolcompras"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  redis:
    image: redis:7-alpine
    container_name: poolcompras-redis
    restart: always
    # Sem persistencia — rate-limit eh transitorio. Se Redis cair, perde
    # contadores de janela atual mas nao afeta dados do app (Postgres).
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal_net

  app:
    build: .
    container_name: poolcompras-app
    restart: always
    environment:
      DATABASE_URL: postgresql://poolcompras:${DB_PASSWORD}@db:5432/poolcompras
      SECRET_KEY: ${SECRET_KEY:?Defina SECRET_KEY no .env}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: run.py
      RUN_SEED: ${RUN_SEED:-false}
      PORT: ${PORT:-5050}
      WEB_WORKERS: ${WEB_WORKERS:-4}
      # Rate-limit GLOBAL entre todos workers Gunicorn via Redis.
      # Sem isso, cada worker tinha contador isolado (4× o limite real).
      RATELIMIT_STORAGE_URI: ${RATELIMIT_STORAGE_URI:-redis://redis:6379/0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-poolcomprasbot}
    volumes:
      - uploads:/app/instance/uploads
      - logs:/var/log
    expose:
      - "${PORT:-5050}"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(5); exit(0 if s.connect_ex(('127.0.0.1',5050)) == 0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_net
      - server_net

volumes:
  pgdata:
  uploads:
  logs:

networks:
  # internal_net: liga app <-> db. Nao tem acesso externo.
  internal_net:
    driver: bridge
  # server_net: rede compartilhada com o cloudflared/proxy externo.
  # Criar uma vez antes do primeiro up: `docker network create server_net`.
  server_net:
    external: true
