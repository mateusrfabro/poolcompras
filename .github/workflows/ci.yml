name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs antigos da mesma branch quando push novo chegar — evita fila
# acumular em pushes consecutivos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          # SECRET_KEY é exigido pelo create_app(). Em CI, qualquer string
          # serve — não é uma chave de prod.
          SECRET_KEY: ci-test-secret-not-for-prod
        # Exclui tests/load (Locust) — é teste de carga, não unit/integration.
        run: pytest tests/ -q --ignore=tests/load
